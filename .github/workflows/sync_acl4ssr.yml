name: Sync ACL4SSR Rules

on:
  schedule:
    - cron: '0 2 * * *' # Run daily at 2:00 UTC
  workflow_dispatch:

jobs:
  sync-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FILE_NAME: "ACL4SSR_Online_Full_WithIcon.yaml"

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper merge

      - name: Sync Clash directory with merge
        run: |
          # Configure merge driver for list files (union keeps both sides' additions)
          echo "*.list merge=union" >> .gitattributes
          echo "*.txt merge=union" >> .gitattributes
          
          # Add upstream as remote
          git remote add upstream https://github.com/ACL4SSR/ACL4SSR.git || true
          git fetch upstream master
          
          # Create a temporary branch from upstream
          git checkout -b upstream-temp upstream/master
          
          # Switch back to master
          git checkout master
          
          # Use git checkout to get upstream Clash files, then merge manually
          # First, get list of files in upstream Clash/
          git diff --name-only master upstream-temp -- Clash/ > /tmp/upstream_clash_files.txt || true
          
          # For each file in upstream Clash/, merge with local version
          mkdir -p Clash
          
          # Copy new files from upstream that don't exist locally
          git diff --name-only --diff-filter=A master upstream-temp -- Clash/ | while read file; do
            git show upstream-temp:"$file" > "$file" 2>/dev/null || true
          done
          
          # For existing files, use git merge-file to merge changes
          git diff --name-only --diff-filter=M master upstream-temp -- Clash/ | while read file; do
            if [ -f "$file" ]; then
              # Get base, ours, theirs versions
              git show upstream-temp:"$file" > /tmp/theirs.tmp 2>/dev/null || continue
              cp "$file" /tmp/ours.tmp
              # Merge: ours + theirs, keeping both additions (union-like)
              git merge-file -p --union /tmp/ours.tmp /tmp/ours.tmp /tmp/theirs.tmp > "$file" 2>/dev/null || cp /tmp/theirs.tmp "$file"
            fi
          done
          
          # Clean up
          git branch -D upstream-temp 2>/dev/null || true
          git remote remove upstream 2>/dev/null || true
          rm -f .gitattributes

      - name: Update URLs in YAML
        run: |
          REPO_NAME="${{ github.repository }}"
          BRANCH="master" # Assuming master branch, change if main
          
          # Base URL for this repository
          NEW_BASE_URL="https://raw.githubusercontent.com/${REPO_NAME}/${BRANCH}/Clash/"
          
          # Replace jsdelivr CDN links
          sed -i "s|https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/|${NEW_BASE_URL}|g" "$FILE_NAME"
          
          # Replace standard GitHub raw links (if any)
          sed -i "s|https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/|${NEW_BASE_URL}|g" "$FILE_NAME"
          
          echo "Updated links in $FILE_NAME"

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Clash/ "$FILE_NAME"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync rules from ACL4SSR and update links [skip ci]"
            git push
          fi
